# ========================================
# 【コンテンツ追加テンプレート】
# 新しいコンテンツを追加したい場合は、下をコピーして使ってください
# ========================================
#
# - id: "XX"              # ユニークなID（例: "04", "05"）
#   title: "タイトル"     # 学習コンテンツのタイトル
#   description: "説明"   # 何を学べるか（2-3行）
#   duration: "XX分"      # 所要時間の目安
#   difficulty: 1         # 1=⭐, 2=⭐⭐, 3=⭐⭐⭐
#   page: "XX_ページ名"   # pagesフォルダ内のファイル名（拡張子なし）
#   icon: "絵文字"        # カードに表示するアイコン
#
# ========================================
