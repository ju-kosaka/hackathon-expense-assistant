# ========================================
# 目指せ！みのるんマスター！- 学習コンテンツ一覧
# ========================================
#
# このファイルは学習コンテンツを管理するYAMLファイルです。
# YAMLは「YAML Ain't Markup Language」の略で、
# 人間が読み書きしやすいデータ形式として広く使われています。
#
# 【YAMLの基本ルール】
# - インデント（字下げ）で階層を表現します（スペース2個が標準）
# - コロン(:)でキーと値を区切ります
# - ハイフン(-)でリストの項目を表します
# - #で始まる行はコメント（説明文）です
#
# 【このファイルの使い方】
# 1. 新しいコンテンツを追加するには、下のテンプレートをコピー
# 2. id, title, description などを書き換える
# 3. GitHubにpushすると、自動的にアプリに反映されます！
#
# ========================================

contents:
  # ----------------------------------------
  # コンテンツ1: 経費精算を5分で終わらせる
  # ----------------------------------------
  - id: "01"
    title: "経費精算を5分で終わらせる"
    description: "毎月の経費精算をAIに任せて、30分→5分に短縮する方法を体験。CSVをアップロードして、Claudeが自動で勘定科目を分類します。"
    duration: "10分"
    difficulty: 1  # 1: ⭐, 2: ⭐⭐, 3: ⭐⭐⭐
    page: "01_💰_経費精算"
    icon: "💰"

