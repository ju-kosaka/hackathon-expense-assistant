# ========================================
# 目指せ！みのるんマスター！- 学習コンテンツ一覧
# ========================================
#
# このファイルは学習コンテンツを管理するYAMLファイルです。
# YAMLは「YAML Ain't Markup Language」の略で、
# 人間が読み書きしやすいデータ形式として広く使われています。
#
# 【YAMLの基本ルール】
# - インデント（字下げ）で階層を表現します（スペース2個が標準）
# - コロン(:)でキーと値を区切ります
# - ハイフン(-)でリストの項目を表します
# - #で始まる行はコメント（説明文）です
#
# 【このファイルの使い方】
# 1. 新しいコンテンツを追加するには、下のテンプレートをコピー
# 2. id, title, description などを書き換える
# 3. GitHubにpushすると、自動的にアプリに反映されます！
#
# ========================================

contents:
  # ----------------------------------------
  # コンテンツ1: 経費精算を5分で終わらせる
  # ----------------------------------------
  - id: "01"
    title: "経費精算を5分で終わらせる"
    description: "毎月の経費精算をAIに任せて、30分→5分に短縮する方法を体験。CSVをアップロードして、Claudeが自動で勘定科目を分類します。"
    duration: "10分"
    difficulty: 1  # 1: ⭐, 2: ⭐⭐, 3: ⭐⭐⭐
    page: "01_💰_経費精算"
    icon: "💰"

  # ----------------------------------------
  # コンテンツ2: プチ仕様駆動開発を体験しよう
  # ----------------------------------------
  - id: "02"
    title: "プチ仕様駆動開発を体験しよう"
    description: "PLAN.md、SPEC.md、TODO.md、KNOWLEDGE.mdの4つのドキュメントを作成して、Claudeとの協働開発の基礎を学びます。"
    duration: "15分"
    difficulty: 1  # 1: ⭐, 2: ⭐⭐, 3: ⭐⭐⭐
    page: "02_📝_プチ仕様駆動開発体験"
    icon: "📝"

  # ----------------------------------------
  # コンテンツ3: 会議の議事録を自動生成
  # ----------------------------------------
  - id: "03"
    title: "会議の議事録を自動生成"
    description: "文字起こしデータから専門用語を認識し、フィラーを除去して、ネクストアクション付きの議事録を自動生成します。"
    duration: "20分"
    difficulty: 2  # 1: ⭐, 2: ⭐⭐, 3: ⭐⭐⭐
    page: "03_📋_会議議事録生成"
    icon: "📋"

  # ----------------------------------------
  # コンテンツ4: Claude Codeでプロマネをぶん回す
  # ----------------------------------------
  - id: "04"
    title: "Claude Codeでプロマネをぶん回す"
    description: "フォルダ構造をハブにした開発プロマネの実践。CLAUDE.md、スキル化、パイプライン構築を体験します。"
    duration: "40分"
    difficulty: 3  # 1: ⭐, 2: ⭐⭐, 3: ⭐⭐⭐
    page: "04_🎯_プロマネ実践"
    icon: "🎯"

  # ----------------------------------------
  # コンテンツ5: Plan modeの計画フォーマットをカスタマイズ
  # ----------------------------------------
  - id: "05"
    title: "Plan modeの計画フォーマットをカスタマイズ"
    description: "Claude Code Plan modeの計画フォーマットをプロジェクトに最適化。plan_output_style.mdを使った実践的なカスタマイズ方法を学びます。"
    duration: "25分"
    difficulty: 2  # 1: ⭐, 2: ⭐⭐, 3: ⭐⭐⭐
    page: "05_📋_Plan modeカスタマイズ"
    icon: "📋"

